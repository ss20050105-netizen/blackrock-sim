<!DOCTYPE html>
<html>
<head>
    <title>BlackRock HQ Simulation - ROI Result</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --office-color: #1e293b;
            --grid-line: #334155;
            --team-a: #10b981;
            --team-b: #ef4444;
            --table-wood: #78350f;
        }
        body { 
            background: var(--bg-color); color: white; font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        .header { height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid #334155; }
        .main-container { display: flex; flex: 1; width: 100%; height: calc(100vh - 60px); }
        .left-panel { flex: 1.3; display: flex; align-items: center; justify-content: center; border-right: 1px solid #334155; background: #020617; }
        .right-panel { flex: 0.7; display: flex; flex-direction: column; background: #000000; padding: 30px; }
        
        #office-container { position: relative; padding: 20px; background: #334155; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #grid { display: grid; grid-template-columns: repeat(9, 65px); grid-template-rows: repeat(9, 65px); gap: 6px; }
        .cell { width: 65px; height: 65px; background: var(--office-color); border-radius: 4px; position: relative; }
        .meeting-table { background: var(--table-wood) !important; border: 3px solid #b45309 !important; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3) !important; z-index: 5; }
        .table-label { position: absolute; width: 100%; top: -25px; text-align: center; font-size: 11px; color: #fbbf24; font-weight: bold; letter-spacing: 1px; }

        .agent-wrapper { position: absolute; width: 65px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 1.3s ease-in-out; z-index: 10; }
        .agent-body { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .agent-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
        
        .thought-bubble { 
            position: absolute; bottom: 80px; background: white; color: #1e293b; 
            padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 20;
        }
        .thought-bubble::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid white;
        }

        #teamA .agent-body { background: var(--team-a); }
        #teamA .agent-name { background: var(--team-a); color: white; }
        #teamB .agent-body { background: var(--team-b); }
        #teamB .agent-name { background: var(--team-b); color: white; }

        #log { flex: 1; overflow-y: auto; padding: 20px; font-size: 16px; line-height: 1.8; border: 1px solid #1e293b; border-radius: 10px; background: rgba(255,255,255,0.03); }
        .system-msg { color: #94a3b8; font-weight: bold; display: block; margin-bottom: 25px; text-align: center; border-bottom: 2px double #1e293b; padding-bottom: 15px; }
        .a-msg { color: #34d399; margin-bottom: 20px; border-left: 4px solid var(--team-a); padding-left: 15px; }
        .b-msg { color: #f87171; margin-bottom: 20px; border-left: 4px solid var(--team-b); padding-left: 15px; }
        
        /* 결과 대시보드 UI 스타일 */
        .result-board { background: rgba(15, 23, 42, 0.9); border: 2px solid #3b82f6; border-radius: 10px; padding: 20px; margin-top: 25px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .result-title { color: #60a5fa; font-weight: bold; font-size: 18px; text-align: center; margin-bottom: 15px; border-bottom: 1px dashed #3b82f6; padding-bottom: 10px; }
        .result-row { display: flex; justify-content: space-between; margin: 12px 0; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 15px; }
        .res-name { color: #e2e8f0; font-weight: bold; width: 140px; }
        .res-money { color: #cbd5e1; flex: 1; text-align: right; margin-right: 15px; }
        .res-yield-a { color: #34d399; font-weight: bold; font-size: 18px; width: 80px; text-align: right; }
        .res-yield-b { color: #f87171; font-weight: bold; font-size: 18px; width: 80px; text-align: right; }
    </style>
</head>
<body>
    <div class="header"><h1>🏢 BLACKROCK STRATEGIC COMMAND CENTER</h1></div>
    
    <div class="main-container">
        <div class="left-panel">
            <div id="office-container">
                <div id="grid"></div>
            </div>
        </div>
        <div class="right-panel">
            <h2 style="color: #64748b; font-size: 16px; margin-top:0; letter-spacing: 2px;">LIVE CONFERENCE FEED</h2>
            <div id="log">
                <span class="system-msg">에이전트들이 중앙 컨퍼런스 룸으로 집결 중입니다...</span>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const log = document.getElementById('log');
        const MAP_SIZE = 9;
        const TARGET = { x: 4, y: 4 };

        for (let i = 0; i < MAP_SIZE * MAP_SIZE; i++) {
            const y = Math.floor(i / MAP_SIZE);
            const x = i % MAP_SIZE;
            const isCenter = (x === TARGET.x && y === TARGET.y);
            grid.innerHTML += `<div class="cell ${isCenter ? 'meeting-table' : ''}">${isCenter ? '<div class="table-label">CONF. TABLE</div>' : ''}</div>`;
        }

        let posA = { x: 0, y: 0 }; 
        let posB = { x: 8, y: 8 }; 
        let isSimRunning = true;

        let thoughtsA = [
            "데이터 딥러닝 분석 개시...", "변동성 지수 임계치 돌파.", "리스크 관리 알고리즘 가동.", 
            "시스템 최적화 프로세스 완료.", "하락 패턴 매칭 94% 일치.", "객관적 지표 실시간 수집.", 
            "감정을 배제한 연산 수행.", "호르무즈 사태 영향 평가.", "안전 자산 헷징 계산 중.", 
            "알라딘 시스템 동기화 완료.", "확률론적 모델 업데이트.", "초기 투자금 1억 원 설정 완."
        ];
        let thoughtsB = [
            "시장의 기류가 변하고 있어...", "베테랑의 직감을 믿어야 해.", "공포 속에서 기회를 포착하자.", 
            "차트 너머의 심리를 읽는 중.", "지금이 바로 인생의 베팅이다.", "데이터는 거짓말을 하지 않나?", 
            "인간의 야성적 충동이 필요해.", "위기는 곧 부의 재편이지.", "시장의 에너지를 느끼자.", 
            "직관은 데이터보다 빠르다.", "패닉 뒤에는 반등이 온다.", "1억 원, 풀 매수 준비 끝."
        ];

        function createAgent(id, name, emoji) {
            const wrapper = document.createElement('div');
            wrapper.id = id; wrapper.className = 'agent-wrapper';
            wrapper.innerHTML = `<div class="thought-bubble" id="${id}-thought"></div><span class="agent-name">${name}</span><div class="agent-body">${emoji}</div>`;
            return wrapper;
        }

        const wrapperA = createAgent('teamA', '알라딘(시스템)', '🤖');
        const wrapperB = createAgent('teamB', '수석 매니저(직감)', '👤');

        function showThought(id, thoughtList) {
            if (!isSimRunning || thoughtList.length === 0) return;
            const bubble = document.getElementById(`${id}-thought`);
            const randomIndex = Math.floor(Math.random() * thoughtList.length);
            const selectedThought = thoughtList.splice(randomIndex, 1)[0];
            bubble.innerText = selectedThought;
            bubble.style.opacity = 1;
            setTimeout(() => { bubble.style.opacity = 0; }, 1700); 
        }

        function updatePos() {
            const cells = document.querySelectorAll('.cell');
            cells[posA.y * MAP_SIZE + posA.x].appendChild(wrapperA);
            cells[posB.y * MAP_SIZE + posB.x].appendChild(wrapperB);
            
            showThought('teamA', thoughtsA);
            showThought('teamB', thoughtsB);
            
            checkCollision();
        }

        function moveTowardCenter(pos) {
            if (pos.x < TARGET.x) pos.x++;
            else if (pos.x > TARGET.x) pos.x--;
            else if (pos.y < TARGET.y) pos.y++;
            else if (pos.y > TARGET.y) pos.y--;
        }

        function checkCollision() {
            if (posA.x === TARGET.x && posA.y === TARGET.y && posB.x === TARGET.x && posB.y === TARGET.y) {
                isSimRunning = false;
                clearInterval(timer);
                startDialogue();
            }
        }

        function startDialogue() {
            addLog("<span class='system-msg'>🚨 [투자 시뮬레이션 개시] 각 에이전트에게 1억 원의 자본금 할당됨</span>");
            
            // 1차 논쟁
            setTimeout(() => addLog("<div class='a-msg'><b>🤖 알라딘:</b> 호르무즈 해협 봉쇄 확인. 저는 배정받은 1억 원을 전량 국채와 금(Gold) 등 안전 자산으로 헷징하겠습니다.</div>"), 1000);
            setTimeout(() => addLog("<div class='b-msg'><b>👤 매니저:</b> 시장의 공포는 과장되었습니다. 저는 1억 원으로 낙폭이 과대한 우량 기술주와 에너지주에 공격적으로 '풀 매수' 하겠습니다.</div>"), 5000);
            
            // 2차 논쟁
            setTimeout(() => addLog("<div class='a-msg'><b>🤖 알라딘:</b> 데이터는 2008년급 충격을 경고합니다. 당신의 직감 투자는 원금을 심각하게 훼손할 확률이 87%입니다.</div>"), 9000);
            setTimeout(() => addLog("<div class='b-msg'><b>👤 매니저:</b> 패닉 셀링에 동참하는 것이야말로 하수입니다. 진정한 수익은 대중과 반대로 갈 때 나옵니다. 한 달 뒤에 계좌를 까보시죠.</div>"), 13000);
            
            // 3차 결과 발표 (수익률 대시보드)
            setTimeout(() => addLog("<span class='system-msg'>⏳ 시간이 흐릅니다... (호르무즈 사태 1개월 후)</span>"), 17000);
            
            setTimeout(() => {
                const resultHTML = `
                <div class='result-board'>
                    <div class='result-title'>📊 1개월 후 포트폴리오 수익률 결과</div>
                    <div class='result-row'>
                        <div class='res-name'>🤖 알라딘 (안전 자산)</div>
                        <div class='res-money'>1억 원 ➔ 1억 250만 원</div>
                        <div class='res-yield-a'>+ 2.5%</div>
                    </div>
                    <div class='result-row'>
                        <div class='res-name'>👤 매니저 (저점 매수)</div>
                        <div class='res-money'>1억 원 ➔ 7,200만 원</div>
                        <div class='res-yield-b'>- 28.0%</div>
                    </div>
                    <div style='color:#94a3b8; font-size:13px; margin-top:15px; text-align:center;'>
                        *글로벌 공급망 쇼크 장기화로 증시 폭락. 시스템의 리스크 방어 로직 승리.
                    </div>
                </div>
                `;
                addLog(resultHTML);
            }, 21000);
        }

        function addLog(msg) { 
            log.innerHTML += "<div>" + msg + "</div>"; 
            log.scrollTop = log.scrollHeight; 
        }

        let timer = setInterval(() => {
            moveTowardCenter(posA);
            moveTowardCenter(posB);
            updatePos();
        }, 2000);

        updatePos();
    </script>
</body>
</html>
