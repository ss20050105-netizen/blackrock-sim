<!DOCTYPE html>
<html>
<head>
    <title>BlackRock HQ Simulation - Talkative Agents</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --office-color: #1e293b;
            --grid-line: #334155;
            --team-a: #10b981;
            --team-b: #ef4444;
        }
        body { background: var(--bg-color); color: white; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { margin-bottom: 10px; color: #f8fafc; }
        
        #office-container { position: relative; padding: 20px; background: #334155; border-radius: 15px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); border: 2px solid #475569; }
        
        #grid { display: grid; grid-template-columns: repeat(6, 70px); grid-template-rows: repeat(6, 70px); gap: 6px; background: var(--grid-line); padding: 6px; border-radius: 8px; }
        .cell { width: 70px; height: 70px; background: var(--office-color); border-radius: 4px; position: relative; }

        /* 에이전트 및 말풍선 스타일 */
        .agent-wrapper { position: absolute; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s ease-in-out; z-index: 10; }
        .agent-body { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.5); border: 2px solid white; }
        .agent-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; padding: 2px 8px; border-radius: 10px; }
        
        /* 말풍선 디자인 */
        .thought-bubble { 
            position: absolute; bottom: 75px; background: white; color: #1e293b; 
            padding: 5px 10px; border-radius: 12px; font-size: 11px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .thought-bubble::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid white;
        }

        #teamA .agent-body { background: var(--team-a); }
        #teamA .agent-name { background: var(--team-a); color: white; }
        #teamB .agent-body { background: var(--team-b); }
        #teamB .agent-name { background: var(--team-b); color: white; }

        #log-container { width: 450px; margin-top: 20px; }
        #log { height: 150px; background: rgba(0,0,0,0.7); padding: 15px; overflow-y: auto; border-radius: 10px; border: 1px solid #475569; font-size: 13px; line-height: 1.6; }
        .system-msg { color: #94a3b8; font-weight: bold; display: block; margin-bottom: 5px; }
        .a-msg { color: #34d399; }
        .b-msg { color: #f87171; }
    </style>
</head>
<body>
    <h1>🏢 BlackRock HQ Strategy Room</h1>
    
    <div id="office-container">
        <div id="grid"></div>
    </div>

    <div id="log-container">
        <div id="log">
            <span class="system-msg">시뮬레이션 가동 중... (에이전트들이 상황을 분석합니다)</span>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const log = document.getElementById('log');
        const MAP_SIZE = 6;

        for (let i = 0; i < MAP_SIZE * MAP_SIZE; i++) grid.innerHTML += '<div class="cell"></div>';

        let posA = { x: 0, y: 0 };
        let posB = { x: 5, y: 5 };
        let isSimRunning = true;

        // 알라딘 혼잣말 후보
        const thoughtsA = ["리스크 신호 발생...", "데이터 재분석 중..", "전부 팔아야 할지도..", "확률이 낮아지고 있어.", "시스템 과열 감지."];
        // 매니저 혼잣말 후보
        const thoughtsB = ["지금이 기회인데..", "차트가 예사롭지 않아.", "전부 사야 돼..!", "인간의 직감을 믿자.", "공포에 사야 한다.."];

        function createAgent(id, name, emoji, thoughts) {
            const wrapper = document.createElement('div');
            wrapper.id = id; wrapper.className = 'agent-wrapper';
            wrapper.innerHTML = `
                <div class="thought-bubble" id="${id}-thought"></div>
                <span class="agent-name">${name}</span>
                <div class="agent-body">${emoji}</div>
            `;
            return wrapper;
        }

        const wrapperA = createAgent('teamA', '알라딘', '🤖');
        const wrapperB = createAgent('teamB', '매니저', '👤');

        function showThought(id, thoughts) {
            if (!isSimRunning) return;
            const bubble = document.getElementById(`${id}-thought`);
            bubble.innerText = thoughts[Math.floor(Math.random() * thoughts.length)];
            bubble.style.opacity = 1;
            setTimeout(() => { bubble.style.opacity = 0; }, 2000);
        }

        function updatePos() {
            const cells = document.querySelectorAll('.cell');
            cells[posA.y * MAP_SIZE + posA.x].appendChild(wrapperA);
            cells[posB.y * MAP_SIZE + posB.x].appendChild(wrapperB);
            
            // 30% 확률로 혼잣말 출력
            if (Math.random() < 0.7) showThought('teamA', thoughtsA);
            if (Math.random() < 0.7) showThought('teamB', thoughtsB);
            
            checkCollision();
        }

        function moveRandomly(pos) {
            const dir = Math.floor(Math.random() * 4);
            if (dir === 0 && pos.y > 0) pos.y--;
            else if (dir === 1 && pos.y < MAP_SIZE - 1) pos.y++;
            else if (dir === 2 && pos.x > 0) pos.x--;
            else if (dir === 3 && pos.x < MAP_SIZE - 1) pos.x++;
        }

        function checkCollision() {
            if (Math.abs(posA.x - posB.x) <= 1 && Math.abs(posA.y - posB.y) <= 1) {
                isSimRunning = false;
                clearInterval(timer);
                startDialogue();
            }
        }

        function startDialogue() {
            addLog("<span class='system-msg'>📍 전략 회의실 조우: 심층 논쟁 시작</span>");
            setTimeout(() => addLog("<b class='a-msg'>🤖 알라딘:</b> 호르무즈 해협 봉쇄 데이터 기반, 즉각적인 전량 매도를 제안합니다."), 1000);
            setTimeout(() => addLog("<b class='b-msg'>👤 매니저:</b> 절대 안 됩니다. 시장의 패닉을 역이용해 '풀 매수'를 때려야 할 시점입니다!"), 3500);
            setTimeout(() => addLog("<b class='a-msg'>🤖 알라딘:</b> 시스템은 감정을 배제합니다. 손실 방어가 최우선입니다."), 6000);
            setTimeout(() => addLog("<b class='b-msg'>👤 매니저:</b> 숫자가 전부는 아니죠. 제 오랜 경험이 지금이 기회라고 말하고 있습니다."), 8500);
            setTimeout(() => addLog("<span class='system-msg'>📢 시뮬레이션 종료: 상반된 의사결정 기록됨.</span>"), 11000);
        }

        function addLog(msg) { 
            log.innerHTML += "<div>" + msg + "</div>"; 
            log.scrollTop = log.scrollHeight; 
        }

        // 속도를 조절했습니다 (0.6초 -> 1.2초로 느리게)
        let timer = setInterval(() => {
            moveRandomly(posA);
            moveRandomly(posB);
            updatePos();
        }, 1200);

        updatePos();
    </script>
</body>
</html>
