<!DOCTYPE html>
<html>
<head>
    <title>BlackRock HQ Simulation - Final Version</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --office-color: #1e293b;
            --grid-line: #334155;
            --team-a: #10b981;
            --team-b: #ef4444;
        }
        body { 
            background: var(--bg-color); color: white; font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        
        .header { height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #334155; }
        
        /* 메인 레이아웃: 5:5 분할 */
        .main-container { display: flex; flex: 1; width: 100%; height: calc(100vh - 60px); }
        
        /* 왼쪽: 맵 영역 */
        .left-panel { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #334155; background: #111827; }
        
        /* 오른쪽: 채팅창 영역 */
        .right-panel { flex: 1; display: flex; flex-direction: column; background: #020617; padding: 20px; }
        
        #office-container { position: relative; padding: 15px; background: #334155; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #grid { display: grid; grid-template-columns: repeat(5, 90px); grid-template-rows: repeat(5, 90px); gap: 10px; }
        .cell { width: 90px; height: 90px; background: var(--office-color); border-radius: 6px; position: relative; }

        .agent-wrapper { position: absolute; width: 90px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.9s ease-in-out; z-index: 10; }
        .agent-body { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        .agent-name { font-size: 13px; font-weight: bold; margin-bottom: 5px; padding: 2px 12px; border-radius: 12px; }
        
        .thought-bubble { 
            position: absolute; bottom: 100px; background: white; color: #1e293b; 
            padding: 8px 14px; border-radius: 14px; font-size: 13px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20;
        }
        .thought-bubble::after {
            content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
            border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 7px solid white;
        }

        #teamA .agent-body { background: var(--team-a); }
        #teamA .agent-name { background: var(--team-a); color: white; }
        #teamB .agent-body { background: var(--team-b); }
        #teamB .agent-name { background: var(--team-b); color: white; }

        #log { flex: 1; overflow-y: auto; padding: 15px; font-size: 16px; line-height: 1.8; border: 1px solid #1e293b; border-radius: 8px; background: rgba(255,255,255,0.02); }
        .system-msg { color: #64748b; font-weight: bold; display: block; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .a-msg { color: #34d399; margin-bottom: 10px; }
        .b-msg { color: #f87171; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header"><h1>🏢 BlackRock HQ Strategy Center</h1></div>
    
    <div class="main-container">
        <!-- 왼쪽: 맵 -->
        <div class="left-panel">
            <div id="office-container">
                <div id="grid"></div>
            </div>
        </div>

        <!-- 오른쪽: 채팅창 -->
        <div class="right-panel">
            <h2 style="color: #94a3b8; font-size: 18px; margin-top:0;">CONFERENCE LOG</h2>
            <div id="log">
                <span class="system-msg">실시간 전략 데이터 분석 중...</span>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const log = document.getElementById('log');
        const MAP_SIZE = 5;

        for (let i = 0; i < MAP_SIZE * MAP_SIZE; i++) grid.innerHTML += '<div class="cell"></div>';

        let posA = { x: 0, y: 0 };
        let posB = { x: 4, y: 4 };
        let isSimRunning = true;
        let moveCount = 0; // 15초 제한을 위한 카운터

        let thoughtsA = [
            "알고리즘 연산 중...", "VIX 지수 급등 확인.", "리스크 오프 시그널 포착.", 
            "과거 데이터 패턴 매칭 중.", "감정을 배제하고 매도 준비.", "호르무즈 위성 데이터 분석."
        ];
        let thoughtsB = [
            "시장의 냄새가 달라...", "지금 안 사면 후회한다.", "공포가 곧 기회다.", 
            "내 직감은 틀리지 않아.", "풀 매수 타이밍 포착.", "투매가 멈추는 지점 분석."
        ];

        function createAgent(id, name, emoji) {
            const wrapper = document.createElement('div');
            wrapper.id = id; wrapper.className = 'agent-wrapper';
            wrapper.innerHTML = `<div class="thought-bubble" id="${id}-thought"></div><span class="agent-name">${name}</span><div class="agent-body">${emoji}</div>`;
            return wrapper;
        }

        const wrapperA = createAgent('teamA', '알라딘(시스템)', '🤖');
        const wrapperB = createAgent('teamB', '수석 매니저(직감)', '👤');

        function showThought(id, thoughtList) {
            if (!isSimRunning || thoughtList.length === 0) return;
            const bubble = document.getElementById(`${id}-thought`);
            const randomIndex = Math.floor(Math.random() * thoughtList.length);
            const selectedThought = thoughtList.splice(randomIndex, 1)[0];
            bubble.innerText = selectedThought;
            bubble.style.opacity = 1;
            setTimeout(() => { bubble.style.opacity = 0; }, 2800);
        }

        function updatePos() {
            const cells = document.querySelectorAll('.cell');
            cells[posA.y * MAP_SIZE + posA.x].appendChild(wrapperA);
            cells[posB.y * MAP_SIZE + posB.x].appendChild(wrapperB);
            
            if (Math.random() < 0.7) showThought('teamA', thoughtsA);
            if (Math.random() < 0.7) showThought('teamB', thoughtsB);
            
            checkCollision();
        }

        function moveAgent(pos, targetPos, forceSeek) {
            if (forceSeek) {
                // 15초 임박 시 상대방 방향으로 추격 (그리디 알고리즘)
                if (pos.x < targetPos.x) pos.x++;
                else if (pos.x > targetPos.x) pos.x--;
                else if (pos.y < targetPos.y) pos.y++;
                else if (pos.y > targetPos.y) pos.y--;
            } else {
                const dir = Math.floor(Math.random() * 4);
                if (dir === 0 && pos.y > 0) pos.y--;
                else if (dir === 1 && pos.y < MAP_SIZE - 1) pos.y++;
                else if (dir === 2 && pos.x > 0) pos.x--;
                else if (dir === 3 && pos.x < MAP_SIZE - 1) pos.x++;
            }
        }

        function checkCollision() {
            if (Math.abs(posA.x - posB.x) <= 1 && Math.abs(posA.y - posB.y) <= 1) {
                isSimRunning = false;
                clearInterval(timer);
                startDialogue();
            }
        }

        function startDialogue() {
            addLog("<span class='system-msg'>🚨 [EVENT] STRATEGY DISPUTE: 호르무즈 사태 대응 회의</span>");
            setTimeout(() => addLog("<div class='a-msg'><b>🤖 알라딘:</b> 위성 데이터 결과 호르무즈 해협 완전 봉쇄 확인. 즉각적인 리스크 분산을 위해 주식 비중을 0%로 조정할 것을 권고합니다.</div>"), 1000);
            setTimeout(() => addLog("<div class='b-msg'><b>👤 수석 매니저:</b> 기계적인 매도는 자살 행위입니다! 시장의 극심한 공포는 곧 강력한 반등 신호입니다. 저는 오히려 레버리지를 활용한 매수를 제안합니다.</div>"), 4500);
            setTimeout(() => addLog("<div class='a-msg'><b>🤖 알라딘:</b> 매니저님의 판단은 '확증 편향'과 '낙관주의 오류'에 기반하고 있습니다. 2경 원의 자산을 그런 불확실한 직감에 맡길 수 없습니다.</div>"), 8000);
            setTimeout(() => addLog("<div class='b-msg'><b>👤 수석 매니저:</b> 숫자가 담지 못하는 '지정학적 협상 가능성'을 읽어야죠. 당신의 알고리즘은 매몰비용 오류에 빠져 현재의 가치를 저평가하고 있습니다!</div>"), 11500);
            setTimeout(() => addLog("<span class='system-msg'>📢 [REPORT] 두 에이전트의 전략 차이가 극명함. 조직행위론적 관점에서의 추가 분석이 필요함.</span>"), 15000);
        }

        function addLog(msg) { 
            log.innerHTML += "<div>" + msg + "</div>"; 
            log.scrollTop = log.scrollHeight; 
        }

        let timer = setInterval(() => {
            moveCount++;
            // 8턴(약 12초) 이후에도 못 만났다면 강제 추적 시작
            const forceSeek = moveCount > 8;
            moveAgent(posA, posB, forceSeek);
            moveAgent(posB, posA, forceSeek);
            updatePos();
        }, 1500);

        updatePos();
    </script>
</body>
</html>
